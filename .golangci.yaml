version: "2"

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod

linters:
  default: all
  disable:
    - arangolint
    - clickhouselint
    - depguard
    - err113
    - exhaustruct
    - forbidigo
    - ginkgolinter
    - gochecknoglobals
    - goheader
    - gomodguard
    - gomodguard_v2
    - loggercheck
    - nilnil
    - nlreturn
    - noinlineerr
    - protogetter
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - tagliatelle
    - testifylint
    - testpackage
    - unqueryvet
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
      package-average: 8
  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
  exclusions:
    generated: strict
    warn-unused: true
